server.port=8080

# ============================================================
# REPLACE THESE WITH YOUR SALESFORCE CONNECTED APP CREDENTIALS
# ============================================================
salesforce.client-id=YOUR_CONNECTED_APP_CONSUMER_KEY
salesforce.client-secret=YOUR_CONNECTED_APP_CONSUMER_SECRET

# For local development:
salesforce.redirect-uri=http://localhost:4200/#/auth/callback

# For production (Heroku/Railway/Render), update to your domain:
# salesforce.redirect-uri=https://your-app.herokuapp.com/#/auth/callback

salesforce.auth-url=https://login.salesforce.com/services/oauth2/authorize
salesforce.token-url=https://login.salesforce.com/services/oauth2/token
salesforce.api-version=v58.0

# Serve Angular static files
spring.web.resources.static-locations=classpath:/static/
